<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<style>
  body{max-width:820px;margin:0 auto;padding:16px 16px 64px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.7;color:#222;background:#fff}
  img{max-width:100%;height:auto;border-radius:8px}
  h1{font-size:1.55rem;line-height:1.3;margin:.2em 0 .4em}
  h2{font-size:1.25rem;line-height:1.3;border-bottom:1px solid #eee;padding-bottom:.2em;margin-top:1.4em}
  h3{font-size:1.05rem}
  table{border-collapse:collapse;width:100%;display:block;overflow-x:auto}
  th,td{border:1px solid #e3e3e3;padding:6px 9px;text-align:left}
  pre{overflow-x:auto;background:#f6f8fa;padding:12px;border-radius:6px}
  code{background:#f0f1f2;padding:.1em .3em;border-radius:4px}
  blockquote{color:#555;border-left:3px solid #ddd;margin:0 0 1em;padding:.2em 12px;background:#fafafa}
  a{color:#0969da}
  hr{border:none;border-top:1px solid #eee;margin:2em 0}
</style>
</head>
<body>
{{ content }}
</body>
</html>
